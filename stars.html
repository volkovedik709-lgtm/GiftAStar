<!DOCTYPE html>

<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Избор</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: black;
  overflow: hidden;
  color: white;
}

.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
  animation: moveStars 100s linear infinite;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 10000px 5000px;}
}

.card:hover { transform: translateY(-10px); }
</style>

</head>

<body>

<div class="stars"></div>

<section class="py-20 text-center relative">
<h1 class="text-4xl mb-10">Избери звезда</h1>

<div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">

<div class="card bg-gray-900 p-6 rounded-xl">
<div class="text-5xl mb-3">⭐</div>
<h3 class="text-yellow-300 font-bold">Звезда A-101</h3>
<p class="text-gray-400 mt-2">Ярка звезда от съзвездието Орион</p>
<button onclick="go()" class="mt-3 bg-white text-black px-3 py-1 rounded">Купи</button>
</div>

<div class="card bg-gray-900 p-6 rounded-xl">
<div class="text-5xl mb-3">⭐</div>
<h3 class="text-blue-300 font-bold">Звезда B-205</h3>
<p class="text-gray-400 mt-2">Синя звезда със силна енергия</p>
<button onclick="go()" class="mt-3 bg-white text-black px-3 py-1 rounded">Купи</button>
</div>

<div class="card bg-gray-900 p-6 rounded-xl">
<div class="text-5xl mb-3">⭐</div>
<h3 class="text-purple-300 font-bold">Звезда C-777</h3>
<p class="text-gray-400 mt-2">Мистична романтична звезда</p>
<button onclick="go()" class="mt-3 bg-white text-black px-3 py-1 rounded">Купи</button>
</div>

<div class="card bg-gray-900 p-6 rounded-xl">
<div class="text-5xl mb-3">⭐</div>
<h3 class="text-green-300 font-bold">Звезда D-888</h3>
<p class="text-gray-400 mt-2">Звезда на късмета</p>
<button onclick="go()" class="mt-3 bg-white text-black px-3 py-1 rounded">Купи</button>
</div>

<div class="card bg-gray-900 p-6 rounded-xl">
<div class="text-5xl mb-3">⭐</div>
<h3 class="text-red-300 font-bold">Звезда E-999</h3>
<p class="text-gray-400 mt-2">Една от най-ярките</p>
<button onclick="go()" class="mt-3 bg-white text-black px-3 py-1 rounded">Купи</button>
</div>

<div class="card bg-gray-900 p-6 rounded-xl">
<div class="text-5xl mb-3">⭐</div>
<h3 class="text-indigo-300 font-bold">Звезда F-321</h3>
<p class="text-gray-400 mt-2">Рядка и красива звезда</p>
<button onclick="go()" class="mt-3 bg-white text-black px-3 py-1 rounded">Купи</button>
</div>

</div>

</section>

<script>
function go(){
  window.location.href="./pricing.html";
}
</script>

</body>
</html>
